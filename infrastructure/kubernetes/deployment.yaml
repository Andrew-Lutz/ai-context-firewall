# AI Context Firewall — Kubernetes Deployment
# Deploys backend, frontend, and supporting infrastructure to a K8s cluster.

---
# ── Namespace ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: acf
  labels:
    app: ai-context-firewall

---
# ── Secrets (values injected via CI/CD or external-secrets-operator) ───────
apiVersion: v1
kind: Secret
metadata:
  name: acf-secrets
  namespace: acf
type: Opaque
stringData:
  DATABASE_URL:          "postgresql+asyncpg://acf_user:CHANGE_ME@postgres-svc:5432/acf_db"
  REDIS_URL:             "redis://:CHANGE_ME@redis-svc:6379/0"
  JWT_SECRET_KEY:        "CHANGE_ME_32_CHARS_MIN"
  ENCRYPTION_KEY:        ""
  SESSION_ENCRYPTION_KEY: ""
  OPENAI_API_KEY:        ""
  ANTHROPIC_API_KEY:     ""

---
# ── Backend Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acf-backend
  namespace: acf
  labels:
    app: acf-backend
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: acf-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: acf-backend
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      serviceAccountName: acf-backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
        fsGroup:      1000
      containers:
        - name: backend
          image: your-registry/acf-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: acf-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu:    "500m"
              memory: "512Mi"
            limits:
              cpu:    "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds:       10
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    3
          volumeMounts:
            - name: policies
              mountPath: /app/policies
              readOnly: true
      volumes:
        - name: policies
          configMap:
            name: acf-policies

---
# ── Backend Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: acf-backend-svc
  namespace: acf
spec:
  selector:
    app: acf-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---
# ── Frontend Deployment ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acf-frontend
  namespace: acf
  labels:
    app: acf-frontend
    component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acf-frontend
  template:
    metadata:
      labels:
        app: acf-frontend
        component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser:    1000
      containers:
        - name: frontend
          image: your-registry/acf-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: streamlit
          env:
            - name: API_BASE_URL
              value: "http://acf-backend-svc:8000"
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds:       15

---
# ── Frontend Service ────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: acf-frontend-svc
  namespace: acf
spec:
  selector:
    app: acf-frontend
  ports:
    - name: http
      port: 8501
      targetPort: 8501

---
# ── Ingress ─────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: acf-ingress
  namespace: acf
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/rate-limit: "60"
spec:
  tls:
    - hosts:
        - firewall.your-domain.com
      secretName: acf-tls
  rules:
    - host: firewall.your-domain.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: acf-backend-svc
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: acf-frontend-svc
                port:
                  number: 8501

---
# ── HorizontalPodAutoscaler ─────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: acf-backend-hpa
  namespace: acf
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: acf-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ── ServiceAccount ──────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: acf-backend-sa
  namespace: acf

---
# ── NetworkPolicy (zero-trust) ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: acf-network-policy
  namespace: acf
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - podSelector:
            matchLabels:
              app: acf-frontend
      ports:
        - port: 8000
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
