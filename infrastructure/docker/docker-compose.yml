version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: acf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-acf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acf_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-acf_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acf_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acf_network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acf_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-acf_redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-acf_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acf_network

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: acf_backend
    restart: unless-stopped
    environment:
      DATABASE_URL:          postgresql+asyncpg://${POSTGRES_USER:-acf_user}:${POSTGRES_PASSWORD:-acf_secret}@postgres:5432/${POSTGRES_DB:-acf_db}
      REDIS_URL:             redis://:${REDIS_PASSWORD:-acf_redis_secret}@redis:6379/0
      JWT_SECRET_KEY:        ${JWT_SECRET_KEY:-change-me-in-production-32chars!!}
      ENCRYPTION_KEY:        ${ENCRYPTION_KEY:-}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:-}
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL:             ${LOG_LEVEL:-INFO}
      ENVIRONMENT:           ${ENVIRONMENT:-production}
      CORS_ORIGINS:          '["http://localhost:8501", "http://frontend:8501"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - acf_network
    volumes:
      - policies_data:/app/policies:ro

  # ── Frontend UI ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: acf_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - acf_network

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: acf_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - acf_network

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: acf_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - acf_network

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: acf_nginx
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - acf_network

networks:
  acf_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  policies_data:
